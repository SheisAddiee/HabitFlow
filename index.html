<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HabitFlow — Track Habits, Build Consistency</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Custom presentation style sheet for the landing viewport */
    body:not(.dark) { background: #F9FAFB; }
    .hero-container { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; text-align: center; max-width: 800px; margin: 0 auto; }
    .hero-badge { background: var(--purple-soft); color: var(--purple); font-size: 12px; font-weight: 600; padding: 6px 12px; border-radius: 99px; margin-bottom: 16px; display: inline-block; text-transform: uppercase; letter-spacing: 0.05em; }
    .hero-container h1 { font-size: 48px; font-weight: 800; tracking: -0.03em; color: var(--text); margin-bottom: 16px; line-height: 1.1; }
    .hero-container h1 span { color: var(--purple); }
    .hero-container p { font-size: 18px; color: var(--text-2); max-width: 540px; margin-bottom: 32px; line-height: 1.5; }
    .hero-actions { display: flex; gap: 12px; justify-content: center; }
    @media (max-width: 640px) { .hero-container h1 { font-size: 36px; } .hero-actions { flex-direction: column; width: 100%; max-width: 280px; } }
  </style>
</head>
<body>

  <div class="hero-container">
    <div class="hero-badge">Atomic Habit Tracker</div>
    <h1>Build daily routines that actually <span>stick</span></h1>
    <p>HabitFlow helps you break down big goals into simple, daily actions. Track your consistency, protect your active streaks, and watch your progress grow inside a clean, distraction-free dashboard.</p>
    
    <div class="hero-actions">
      <a href="dashboard.html" class="btn btn-primary" style="padding: 14px 28px; font-size: 15px;">
        Open Your Dashboard
      </a>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
