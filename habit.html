<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Routines — HabitFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Premium Management Layout Matrix */
    .manage-list { display: flex; flex-direction: column; gap: 16px; margin-top: 20px; }
    .manage-card { background: var(--bg-card); padding: 20px; border-radius: 14px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; transition: all 0.2s ease; }
    .manage-card:hover { border-color: var(--purple); }
    .manage-left { display: flex; align-items: center; gap: 16px; }
    .manage-meta h4 { font-size: 16px; font-weight: 600; color: var(--text); margin: 0 0 4px 0; }
    .manage-meta p { font-size: 13px; color: var(--text-2); margin: 0; }
    
    .manage-right-deck { display: flex; align-items: center; gap: 24px; }
    .freq-badge { background: var(--bg-app); color: var(--text-2); font-size: 12px; font-weight: 500; padding: 4px 10px; border-radius: 6px; border: none; cursor: pointer; transition: all 0.2s; }
    .freq-badge:hover { filter: brightness(0.95); }
    
    /* Interactive Check Button component inside Setup panel */
    .manage-check-btn { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--border); background: transparent; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; transition: all 0.2s; }
    .manage-check-btn:hover { border-color: #22C55E; }
    .manage-check-btn.completed { background: #22C55E; border-color: #22C55E; box-shadow: 0 2px 8px rgba(34, 197, 94, 0.3); }
  </style>
</head>
<body>

        HabitFlow

        <a href="statistics.html"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Statistics</a>
