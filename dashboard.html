<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — HabitFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Clean layout structures to align top items perfectly */
    .dashboard-header-block { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 32px; width: 100%; }
    .header-user-meta { display: flex; align-items: center; gap: 16px; }
    .actions-group-deck { display: flex; align-items: center; gap: 12px; }
    
    /* Interactive top accessory item layout styling */
    .header-date-badge { font-size: 13px; font-weight: 600; color: var(--text-2); padding: 8px 14px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; }
    .header-action-icon-btn { background: var(--bg-card); border: 1px solid var(--border); width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: var(--text-2); cursor: pointer; transition: all 0.2s; }
    .header-action-icon-btn:hover { border-color: var(--purple); color: var(--purple); }
    
    /* Global user avatar frame badge */
    .top-deck-avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--purple); color: white; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; box-shadow: 0 2px 8px rgba(99, 102, 241, 0.2); }
  </style>
</head>
<body>

  <div class="app-shell">

    <aside class="sidebar">
      <a href="index.html" class="logo">
        <span class="logo-mark">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6"/><path d="M5 12a7 7 0 1 0 14 0c0-3-2-5-7-10-5 5-7 7-7 10z"/></svg>
        </span>
        HabitFlow
      </a>

      <nav class="sidebar-nav">
        <a href="dashboard.html" class="active">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12 12 3l9 9"/><path d="M5 10v10h14V10"/></svg>
          Dashboard
        </a>
        <a href="statistics.html">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          Statistics
        </a>
        <a href="habit.html">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          Habits
        </a>
        <a href="calendar.html">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Calendar
        </a>
        <a href="profile.html">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Profile
        </a>
        <a href="settings.html">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1A2 2 0 1 1 4.3 17l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1.1 1.7 1.7 0 0 0-.3-1.8l-.1-.1A2 2 0 1 1 7 4.3l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></svg>
          Settings
        </a>
      </nav>

      <a href="index.html" class="logout">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Log out
      </a>
    </aside>
    <div class="backdrop"></div>

    <main class="main">
      
      <div class="dashboard-header-block">
        <button class="menu-toggle" aria-label="Open menu" style="margin-top: 4px; margin-right: 12px;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>

        <div class="greeting" style="flex-grow: 1;">
          <h1 style="font-size: 24px; font-weight: 800; margin: 0 0 4px 0;">Good morning! 👋</h1>
          <p style="margin: 0; font-size: 14px; color: var(--text-2);">Let's make today productive.</p>
        </div>

        <div class="header-user-meta">
          <div class="actions-group-deck">
            <span class="header-date-badge">May 20, 2026</span>
            <button class="btn btn-primary" id="add-habit-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Add Habit
</button>
          </div>
          <div class="top-deck-avatar avatar">AJ</div>
        </div>
      </div>

      <div class="stat-grid">
        <div class="stat-card">
          <div class="label">Total Habits</div>
          <div class="value">0</div>
        </div>
        <div class="stat-card">
          <div class="label">Total Completions</div>
          <div class="value">0</div>
        </div>
        <div class="stat-card">
          <div class="label">Current Streak <span>🔥</span></div>
          <div class="value">0</div>
        </div>
      </div>

      <div class="section-head" style="margin-top: 12px; margin-bottom: 20px;">
        <h2>Today's Habits</h2>
        
      </div>

      <div class="habit-list">
        </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
